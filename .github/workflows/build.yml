name: Build ReFrame

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn package -B

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: ReFrame-1.21.4
          path: target/ReFrame-*.jar
          retention-days: 30
